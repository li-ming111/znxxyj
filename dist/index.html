<body>
    <div id="app"></div>
    <script>
        // 在所有脚本执行前捕获全局错误
        window.addEventListener('error', function(e) {
            console.warn('⚠️ 脚本错误被捕获:', e.message || 'unknown error');
            e.preventDefault();
            return true;
        }, true);
        window.addEventListener('unhandledrejection', function(e) {
            console.warn('⚠️ Promise错误被捕获');
            e.preventDefault();
        });
    </script>
    
</body>
